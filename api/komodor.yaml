components:
  schemas:
    ActionType:
      type: string
      enum:
        - deleteResource
        - describeResource
        - restartService
        - scale
        - argoRolloutRestart
        - editResource
        - updateContainersResources
        - free-command
        - runKubectlCommand
        - rbacRunKubectlCommand
        - getPodMetrics
        - getNodeMetrics
        - http-requests
        - manageArgoCD
        - patchResource
        - jobRunNow
        - jobRerun
        - cordon
        - uncordon
        - installHelmChart
        - revertHelmChart
        - rollbackService
      x-oapi-codegen-extra-tags:
        binding: >-
          required,oneof=deleteResource describeResource restartService scale
          argoRolloutRestart editResource updateContainersResources free-command
          runKubectlCommand rbacRunKubectlCommand getPodMetrics getNodeMetrics
          http-requests manageArgoCD patchResource jobRunNow jobRerun cordon
          uncordon installHelmChart revertHelmChart rollbackService
    Resource:
      type: object
      required:
        - clusterName
      properties:
        clusterName:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
        namespace:
          type: string
        kind:
          type: string
        name:
          type: string
    MinimalAction:
      type: object
      required:
        - type
        - resource
      properties:
        type:
          $ref: '#/components/schemas/ActionType'
        resource:
          $ref: '#/components/schemas/Resource'
    ScaleMetadataData:
      type: object
      required:
        - newValue
        - currValue
      properties:
        newValue:
          type: integer
          x-oapi-codegen-extra-tags:
            binding: 'required,min=0'
        currValue:
          type: integer
          x-oapi-codegen-extra-tags:
            binding: 'required,min=0'
    ScaleMetadata:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/ScaleMetadataData'
    EditResourceMetadata:
      type: object
      required:
        - oldJson
        - newJson
      properties:
        oldJson:
          type: object
          x-oapi-codegen-extra-tags:
            binding: required
        newJson:
          type: object
          x-oapi-codegen-extra-tags:
            binding: required
    FreeCommandMetadata:
      type: object
      required:
        - command
      properties:
        command:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
            validate: 'required,min=1'
        args:
          type: array
          items:
            type: string
            x-oapi-codegen-extra-tags:
              validate: 'required,min=1'
              binding: 'required,min=1'
    RunKubectlCommandMetadata:
      type: object
      required:
        - command
      properties:
        command:
          type: string
          x-oapi-codegen-extra-tags:
            validate: 'required,min=1'
            binding: 'required,min=1'
    HttpRequest:
      type: object
      required:
        - url
        - method
      properties:
        url:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
            validate: 'required,url'
        method:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
          x-oapi-codegen-extra-tags:
            binding: required
            validate: 'required,oneof=GET POST PUT DELETE PATCH'
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          type: string
        timeout:
          type: integer
          description: Timeout in seconds
          default: 30
    HttpRequestsMetadata:
      type: object
      required:
        - requests
      properties:
        requests:
          type: array
          minItems: 1
          maxItems: 10
          x-oapi-codegen-extra-tags:
            binding: 'required,min=1,max=10,dive'
            validate: 'required,min=1,max=10,dive'
          items:
            $ref: '#/components/schemas/HttpRequest'
    PatchResourceMetadata:
      type: object
      required:
        - patchData
      properties:
        patchData:
          type: string
          description: Patch data in the format appropriate for the patch type
          x-oapi-codegen-extra-tags:
            binding: required
        patchType:
          type: string
          description: 'Type of patch: strategic, merge, or json'
          enum:
            - strategic
            - merge
            - json
          default: strategic
    CronJobRunNowMetadata:
      type: object
      required:
        - jobKomodorUID
      properties:
        jobKomodorUID:
          type: string
          description: CronJob Komodor UID to rerun
          x-oapi-codegen-extra-tags:
            binding: required
            validate: 'required,min=1'
    JobRerunMetadata:
