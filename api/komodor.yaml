    CustomEventDto:
      type: object
      required:
        - eventType
        - summary
      properties:
        eventType:
          type: string
          description: >-
            Required. The type of event you'd like to create, limited to 30
            characters.
          maxLength: 30
          example: deployment
        summary:
          type: string
          description: Required. Description of the event.
          example: New deployment event triggered
        scope:
          type: object
          description: >-
            {Optional} The Scope of the event;  The scope field allows the user
            to define the Services to associate the custom event with. By
            default, when no scope is specified, the event will be correlated to
            all Services on the account level.  When specifying a
            cluster/namespace/service name you are narrowing the scope
            accordingly  (within a specific scope field (e.g. - cluster,
            namespaces, serviceNames)).
          properties:
            clusters:
              type: array
              description: List of cluster identifiers.
              items:
                type: string
              example:
                - cluster-1
                - cluster-2
            servicesNames:
              type: array
              description: List of service names.
              items:
                type: string
              example:
                - service-A
                - service-B
            namespaces:
              type: array
              description: List of namespaces.
              items:
                type: string
              example:
                - namespace-1
                - namespace-2
        severity:
          type: string
          enum:
            - information
            - warning
            - error
          default: information
          description: Optional. Severity level of the event. Defaults to 'information'.
          example: warning
        details:
          type: object
          description: Optional. Additional key-value pairs for extra event details.
          additionalProperties:
            type: string
          example:
            key: val
            key2: val2
    CustomEventResponse:
      type: object
      properties:
        message:
          type: string
          example: Custom event sent successfully
