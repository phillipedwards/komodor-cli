openapi: 3.0.3
info:
  title: Public API
  description: This is an API that exposes public api functionality
  version: 1.0.0
servers:
  - url: 'https://api.komodor.com'
security:
  - ApiKeyAuth: []
tags:
  - name: Services
  - name: Jobs
  - name: Events
  - name: Issues
  - name: Kubeconfig
  - name: Clusters
  - name: Audit Logs
  - name: Users
  - name: Roles
  - name: Policies
  - name: Actions
  - name: ApiKey
    description: ''
  - name: Rbac
    description: ''
  - name: Monitors
    description: ''
paths:
  /api/v2/services/search:
    post:
      tags:
        - Services
      summary: Search for services
      description: >
        Search for services based on the provided criteria. If no criteria is
        provided, the default is to return all services.


        **Pagination:** This endpoint uses cursor-based (keyset) pagination for
        efficient handling of large result sets.

        - Omitting `pagination` is equivalent to the first page with `pageSize`
        100 (cursor token omitted)

        - Pass `pageSize` to customize results per page (max 10000)

        - Response `meta` is always returned with the requested `pageSize`;
        `meta.token` is present when more results exist

        - Stop paging when `meta.token` is absent; pass `pagination.token` from
        the previous response for the next page

        - When `issueReasonCategory` filter is active, cursor pagination is
        disabled to avoid boundary issues from client-side filtering
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchServicesBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchServicesResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/jobs/search:
    post:
      tags:
        - Jobs
      summary: Search for jobs and cron jobs
      description: >-
        Search for jobs based on the provided criteria. If no criteria is
        provided, the default is to return all jobs.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchJobsBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchJobsResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/service/yaml:
    get:
      tags:
        - Services
      summary: Get service YAML
      description: Get the YAML for a service
      parameters:
        - $ref: '#/components/parameters/ClusterParam'
        - $ref: '#/components/parameters/NamespaceParam'
        - $ref: '#/components/parameters/KindParam'
        - $ref: '#/components/parameters/NameParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStateYamlResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        '404':
          $ref: '#/components/responses/404Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/services/issues/search:
    post:
      tags:
        - Issues
      summary: Search for issues in service scope
      description: >-
        Search for issues based on the provided criteria. Maximum time range is
        2 days. If no time range is provided, the default is the last 24 hours.
        Maximum time back is 7 days.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchServicesIssuesBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchIssuesResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/clusters/issues/search:
    post:
      tags:
        - Issues
      summary: Search for issues in cluster scope
      description: >-
        Search for issues based on the provided criteria. Maximum time range is
        2 days. If no time range is provided, the default is the last 24 hours.
        Maximum time back is 7 days.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchClustersIssuesBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchIssuesResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/services/k8s-events/search:
    post:
      tags:
        - Events
      summary: Search for k8s events in service scope
      description: >-
        Search for events based on the provided criteria. Maximum time range is
        2 days. If no time range is provided, the default is the last 24 hours.
        Maximum time back is 7 days.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchServicesK8sEventsBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchEventsResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/services/k8s-events:
    post:
      tags:
        - Events
      summary: Create a custom k8s event for services
      description: >-
        Create a new custom event that will be shown in the timeline and events
        list. The event will be associated with the specified services.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceCustomEventBody'
      responses:
        '201':
          description: Event created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCustomEventResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/clusters/k8s-events/search:
    post:
      tags:
        - Events
      summary: Search for k8s events in cluster scope
      description: >-
        Search for events based on the provided criteria. Maximum time range is
        2 days. If no time range is provided, the default is the last 24 hours.
        Maximum time back is 7 days.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchClustersK8sEventsBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchEventsResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/rbac/kubeconfig:
    get:
      summary: Download Kubeconfig File
      tags:
        - Kubeconfig
      description: >-
        Download a kubeconfig file for the specified cluster names. If no
        cluster names are specified, the kubeconfig file for all available
        clusters will be returned.
      parameters:
        - $ref: '#/components/parameters/clusterNamesParam'
        - $ref: '#/components/parameters/kubeconfigConnection'
      responses:
        '200':
          description: Successfully retrieved kubeconfig file
          content:
            application/x-yaml:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/clusters:
    get:
      summary: Get list of clusters
      tags:
        - Clusters
      description: 'Fetch a list of all clusters, optionally filtered by name or tags.'
      parameters:
        - $ref: '#/components/parameters/clusterNamesParam'
        - $ref: '#/components/parameters/tags'
      responses:
        '200':
          description: Successfully retrieved Clusters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClustersResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        '404':
          $ref: '#/components/responses/404Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/user/clusters:
    get:
      summary: Get user's accessible clusters
      tags:
        - Clusters
      description: >-
        Fetch a list of clusters that the authenticated user has access to based
        on their permissions. Returns only cluster name and ID.
      responses:
        '200':
          description: Successfully retrieved user clusters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserClustersResponse'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/realtime-monitors/config:
    get:
      tags:
        - Real Time Monitors
      responses:
        '200':
          description: List of monitors objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMonitorsResponse'
    post:
      tags:
        - Real Time Monitors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitorConfigurationParams'
      responses:
        '201':
          description: ID of created monitor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorConfiguration'
  '/api/v2/realtime-monitors/config/{id}':
    get:
      tags:
        - Real Time Monitors
      parameters:
        - name: id
          required: true
          in: path
          description: uuid of a monitor
          schema:
            type: string
      responses:
        '200':
          description: Monitor object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorConfiguration'
    put:
      tags:
        - Real Time Monitors
      parameters:
        - name: id
          required: true
          in: path
          description: uuid of a monitor
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitorConfigurationParams'
      responses:
        '200':
          description: Monitor Successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitorConfiguration'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
    delete:
      tags:
        - Real Time Monitors
      parameters:
        - name: id
          required: true
          in: path
          description: uuid of a monitor
          schema:
            type: string
      responses:
        '204':
          description: No content
  /api/v2/audit-log:
    get:
      tags:
        - Audit Logs
      summary: Query Audit Logs
      description: >
        Query audit logs with filters, sort and pagination. Use `Accept:
        text/csv` header to get the response as CSV file.
      parameters:
        - name: Accept
          in: header
          required: false
          description: >
            Response format. Use 'application/json' to get the response as JSON.
            Use 'text/csv' to get the response as CSV file. Notice that paging
            is ignored in CSV response, so all logs matched the query are
            returned.
          schema:
            type: string
            default: application/json
        - name: id
          in: query
          required: false
          description: |
            Audit log id. If not provided, the default is all ids.
          schema:
            type: string
        - name: userIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              description: uuid
          style: form
          explode: true
        - name: actions
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: categories
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: operations
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: entityTypes
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: entityName
          in: query
          required: false
          schema:
            type: string
            description: >
              Entity name or part of it, case insensitive. If not provided, the
              default is all entity names.
        - name: startTime
          in: query
          required: false
          description: >
            Start time of the audit logs query. If not provided, the default is
            8 hours ago. Start time parameter is ignored if the response is CSV.
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          required: false
          description: >
            End time of the audit logs query. If not provided, the default is
            now. End time parameter is ignored if the response is CSV.
          schema:
            type: string
            format: date-time
        - name: status
          in: query
          required: false
          description: >
            Status of the audit logs query. If not provided, the default is all
            statuses.
          schema:
            type: string
          example: success
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: >
            Page number. If not provided, the default is 1. Page parameter is
            ignored if the response is CSV.
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: >
            Page size. If not provided, the default is 20. Page size parameter
            is ignored if the response is CSV.
        - name: sort
          in: query
          required: false
          schema:
            type: string
            description: >
              Comma separated sort fields. Prefix with '-' for descending, no
              prefix for ascending. Example: "eventTime,-category"
          example: 'eventTime,-category'
      responses:
        '200':
          description: Successful audit logs query
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment;filename=audit_log.csv
                description: |
                  Available when Content-Type header is 'text/csv'.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogs'
            text/csv:
              schema:
                type: string
                format: binary
                description: CSV file with audit logs
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/audit-log/filters:
    get:
      tags:
        - Audit Logs
      summary: Get available filter values for Query Audit Logs
      parameters:
        - name: startTime
          in: query
          required: false
          description: >
            Start time of the audit logs filters. If not provided, the default
            is 8 hours ago.
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          required: false
          description: >
            End time of the audit logs filters. If not provided, the default is
            now.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Successful audit logs filters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogFilters'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/health/risks:
    get:
      tags:
        - Health risks
      summary: Get all the health risks.
      description: Get all the health risks.
      operationId: getHealthRisks
      parameters:
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/checkTypeRequestParam'
        - $ref: '#/components/parameters/status'
        - $ref: '#/components/parameters/clusterName'
        - $ref: '#/components/parameters/namespace'
        - $ref: '#/components/parameters/shortResourceNameSearchTerm'
        - $ref: '#/components/parameters/shortResourceName'
        - $ref: '#/components/parameters/impactGroupId'
        - $ref: '#/components/parameters/impactGroupType'
        - $ref: '#/components/parameters/severityRequestParam'
        - $ref: '#/components/parameters/komodorUid'
        - $ref: '#/components/parameters/resourceTypeRequestParam'
        - $ref: '#/components/parameters/createdFromEpoch'
        - $ref: '#/components/parameters/createdToEpoch'
        - $ref: '#/components/parameters/checkCategory'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAllHealthRisksResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  '/api/v2/health/risks/{id}':
    get:
      tags:
        - Health risks
      summary: Get health risk data.
      description: Get health risk data.
      operationId: getHealthRiskData
      parameters:
        - $ref: '#/components/parameters/idInPath'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetViolationResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
    put:
      tags:
        - Health risks
      summary: Update the status of a health risk.
      description: Update the status of a health risk.
      operationId: updateHealthRiskStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: '#/components/schemas/ViolationStatusRequestParam'
      parameters:
        - $ref: '#/components/parameters/idInPath'
      responses:
        '200':
          description: Successful response containing the updated violation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUpdateViolationResponse'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/users:
    get:
      summary: Get Users
      tags:
        - Users
      parameters:
        - name: displayName
          in: query
          required: false
          style: form
          explode: false
          schema:
            type: string
        - name: email
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: string
          x-oapi-codegen-extra-tags:
            binding: 'omitempty,email'
        - name: isDeleted
          description: >-
            Filter either deleted or not deleted users. If not provided, all
            users will be returned.
          in: query
          required: false
          style: form
          explode: false
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        '409':
          $ref: '#/components/responses/409Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
    post:
      summary: Create a User
      tags:
        - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        '409':
          $ref: '#/components/responses/409Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  '/api/v2/users/{id_or_email}':
    get:
      summary: Get a User by id or email
      tags:
        - Users
      parameters:
        - $ref: '#/components/parameters/UserIdOrEmailParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        '404':
          $ref: '#/components/responses/404Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
    put:
      summary: Update a User by id or email
      tags:
        - Users
      parameters:
        - $ref: '#/components/parameters/UserIdOrEmailParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Successfully updated role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        '404':
          $ref: '#/components/responses/404Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
    delete:
      summary: Delete a User by id or email
      tags:
        - Users
      parameters:
        - $ref: '#/components/parameters/UserIdOrEmailParam'
      responses:
        '204':
          description: Successfully deleted user
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        '404':
          $ref: '#/components/responses/404Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/users/effective-permissions:
    get:
      summary: Get User's Effective Permissions
      description: Get user's effective permissions by either user id or email.
      tags:
        - Users
      parameters:
        - name: id
          in: query
          required: false
          style: form
          schema:
            type: string
          x-oapi-codegen-extra-tags:
            binding: 'required_without=Email,excluded_with=Email,omitempty,uuid'
        - name: email
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: string
          x-oapi-codegen-extra-tags:
            binding: 'required_without=Id,excluded_with=Id,omitempty,email'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EffectivePermission'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        '404':
          $ref: '#/components/responses/404Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
  /api/v2/rbac/roles:
    get:
      summary: Get All Roles
      tags:
        - Roles
      description: Get all roles for the account
      responses:
        '200':
          description: Successfully retrieved roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        5XX:
          $ref: '#/components/responses/5XXResponse'
    post:
      summary: Create Role
      tags:
        - Roles
      description: Create a new role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleCreateRequest'
      responses:
        '201':
          description: Successfully created role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
        '400':
          $ref: '#/components/responses/400Response'
        '403':
          $ref: '#/components/responses/403Response'
        '409':
