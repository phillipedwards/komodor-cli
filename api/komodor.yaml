        - applyProtocol
      properties:
        name:
          type: string
          x-oapi-codegen-extra-tags:
            binding: required
        description:
          type: string
        priority:
          type: integer
          format: int32
          description: Policy evaluation priority (higher wins)
          x-oapi-codegen-extra-tags:
            binding: gte=0
        optimizationPreset:
          description: >
            Determines how the policy's preset-bound sub-fields are sourced.
            When set to a named preset (`sandbox`, `development`, `staging`,
            `production`), the preset-bound sub-fields (`guardRails`,
            `percentile`, `cpuPercentile`, `memoryPercentile`,
            `allowQoSUpgrade`, `allowQoSUpgradeV2`, `allowQoSDowngrade`) must be
            omitted — sending any of them returns HTTP 400
            (`PRESET_FIELDS_FORBIDDEN`). The server fills those fields from the
            preset definition automatically. When set to `custom`, `guardRails`
            is required, plus a percentile for each managed request resource:
            `percentile` (applies to both), or
            `cpuPercentile`/`memoryPercentile` for the resources managed via
            `guardRails.managedResources` — omitting a required percentile
            returns HTTP 400 (`MISSING_PRESET_SUBFIELDS`).
          allOf:
            - $ref: '#/components/schemas/OptimizationPresetType'
          x-oapi-codegen-extra-tags:
            binding: 'required,oneof=sandbox development staging production custom'
            validate: 'required,oneof=sandbox development staging production custom'
        scopes:
          type: array
          items:
            $ref: '#/components/schemas/PolicyResourceScope'
          x-oapi-codegen-extra-tags:
            binding: required
        guardRails:
          allOf:
            - $ref: '#/components/schemas/PolicyGuardRails'
          x-oapi-codegen-extra-tags:
            binding: omitempty
        percentile:
          deprecated: true
          description: >-
            Deprecated. Use cpuPercentile/memoryPercentile; used for both when
            they're unset.
          allOf:
            - $ref: '#/components/schemas/RightSizingPolicyPercentile'
          x-oapi-codegen-extra-tags:
            binding: 'omitempty,oneof=70 80 90 95 99'
            validate: 'omitempty,oneof=70 80 90 95 99'
        cpuPercentile:
          description: >-
            The percentile to use for CPU right sizing. Falls back to percentile
            when unset.
          allOf:
            - $ref: '#/components/schemas/RightSizingPolicyPercentile'
          x-oapi-codegen-extra-tags:
            binding: 'omitempty,oneof=70 80 90 95 99'
            validate: 'omitempty,oneof=70 80 90 95 99'
        memoryPercentile:
          description: >-
            The percentile to use for memory right sizing. Falls back to
            percentile when unset.
          allOf:
            - $ref: '#/components/schemas/RightSizingPolicyPercentile'
          x-oapi-codegen-extra-tags:
            binding: 'omitempty,oneof=70 80 90 95 99'
            validate: 'omitempty,oneof=70 80 90 95 99'
        applyProtocol:
          type: string
          description: When does a right sizing policy optimization apply?
          enum:
            - immediate
            - onCreation
          x-oapi-codegen-extra-tags:
            binding: 'required,oneof=immediate onCreation'
            validate: 'required,oneof=immediate onCreation'
        allowQoSUpgrade:
          deprecated: true
          description: >
            Deprecated. Use allowQoSUpgradeV2 (bool) instead. This field is kept
            for backward compatibility with existing agents and will be removed
            in a future release.
          allOf:
            - $ref: '#/components/schemas/RightSizingPolicyAllowQoSUpgrade'
          x-oapi-codegen-extra-tags:
            binding: 'omitempty,oneof=notAllowed bestEffortToBurstable'
            validate: 'omitempty,oneof=notAllowed bestEffortToBurstable'
        allowQoSUpgradeV2:
          type: boolean
          description: >-
            Indicates whether the right-sizing policy allows upgrading the k8s
            pod Quality of Service (QoS) class.
          x-oapi-codegen-extra-tags:
            binding: omitempty
            validate: omitempty
        allowQoSDowngrade:
          type: boolean
          description: >-
            Indicates whether the right-sizing policy allows downgrading the k8s
            pod Quality of Service (QoS) class.
          x-oapi-codegen-extra-tags:
            binding: omitempty
            validate: omitempty
        allowHpaRightSizing:
          type: boolean
          description: >-
            Indicates whether the right-sizing policy is allowed to adjust the
            HPA configuration to maintain consistent scaling behavior. When
            false, workloads with an active HPA will be skipped to prevent
            conflicts between right-sizing and autoscaling.
        allowRestart:
          type: boolean
          description: >-
            Indicates whether the right-sizing policy allows Komodor to restart
            the service when new recommendations arrive, so onCreation protocol
            services get updated without waiting for natural pod restarts.
        tags:
          type: array
          items:
            type: string
            maxLength: 200
            pattern: '^[a-z0-9][a-z0-9_\-:./]*$'
          maxItems: 20
          description: >
            Optional client-managed tags for categorization. Each tag must start
            with a letter or number, contain only [a-z0-9_\-:./], be lowercase,
            and be at most 200 characters.
