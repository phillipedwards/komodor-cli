          properties:
            type:
              $ref: '#/components/schemas/ActionType'
            metadata:
              anyOf:
                - $ref: '#/components/schemas/ScaleMetadata'
                - $ref: '#/components/schemas/EditResourceMetadata'
                - $ref: '#/components/schemas/FreeCommandMetadata'
                - $ref: '#/components/schemas/RunKubectlCommandMetadata'
                - $ref: '#/components/schemas/HttpRequestsMetadata'
                - $ref: '#/components/schemas/PatchResourceMetadata'
                - $ref: '#/components/schemas/CronJobRunNowMetadata'
                - $ref: '#/components/schemas/JobRerunMetadata'
                - $ref: '#/components/schemas/InstallHelmChartMetadata'
                - $ref: '#/components/schemas/RevertHelmReleaseMetadata'
            resource:
              $ref: '#/components/schemas/Resource'
    SubmitBulkActionsRequest:
      type: object
      required:
        - actions
